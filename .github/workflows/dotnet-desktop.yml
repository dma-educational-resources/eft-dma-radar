name: Deploy to GitHub Releases

on:
  push:
    branches:
      - beta
      - main
    paths:
      - 'resources/**'
      - 'src/**'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    if: github.repository_owner == 'HuiTeab' || github.repository_owner == 'dma-educational-resources'
    runs-on: windows-latest
    environment: production

    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version info
        uses: dotnet/nbgv@master
        id: nbgv

      - name: Determine release channel
        id: channel
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}"
          $baseVersion = "${{ steps.nbgv.outputs.SemVer2 }}"

          if ($branch -eq "beta") {
            $version = "$baseVersion-beta"
            $tag = "v$baseVersion-beta"
            $releaseName = "EFT $baseVersion-beta (Pre-release)"
            $prerelease = "true"
            $channel = "beta"
            $emoji = "🧪"
            $color = "16766720"
          } else {
            $version = "$baseVersion"
            $tag = "v$baseVersion"
            $releaseName = "EFT $baseVersion"
            $prerelease = "false"
            $channel = "stable"
            $emoji = "🚀"
            $color = "5763719"
          }

          "VERSION=$version" >> $env:GITHUB_OUTPUT
          "TAG=$tag" >> $env:GITHUB_OUTPUT
          "RELEASE_NAME=$releaseName" >> $env:GITHUB_OUTPUT
          "PRERELEASE=$prerelease" >> $env:GITHUB_OUTPUT
          "CHANNEL=$channel" >> $env:GITHUB_OUTPUT
          "EMOJI=$emoji" >> $env:GITHUB_OUTPUT
          "COLOR=$color" >> $env:GITHUB_OUTPUT

          Write-Host "Branch: $branch"
          Write-Host "Version: $version"
          Write-Host "Channel: $channel"
          Write-Host "Pre-release: $prerelease"

      - name: Send Discord Webhook (Build Started)
        if: env.DISCORD_WEBHOOK != ''
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
          JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CHANNEL: ${{ steps.channel.outputs.CHANNEL }}
          VERSION: ${{ steps.channel.outputs.VERSION }}
          EMOJI: ${{ steps.channel.outputs.EMOJI }}
          COLOR: ${{ steps.channel.outputs.COLOR }}
        run: |
          $payload = @{
            username = "GitHub Actions"
            embeds = @(
              @{
                title = "$env:EMOJI $env:REPO"
                description = "Build started — **$($env:CHANNEL.ToUpper())** channel"
                color = [int]$env:COLOR
                fields = @(
                  @{
                    name  = "Version"
                    value = "``$env:VERSION``"
                    inline = $true
                  },
                  @{
                    name  = "Channel"
                    value = $env:CHANNEL
                    inline = $true
                  },
                  @{
                    name  = "Commit"
                    value = $env:COMMIT_MESSAGE
                  },
                  @{
                    name  = "Job Link"
                    value = $env:JOB_URL
                  }
                )
              }
            )
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK -Method Post -ContentType "application/json" -Body $payload

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Dotnet Publish
        run: |
          dotnet publish src/eft-dma-radar.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:SatelliteResourceLanguages=en `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=${{ steps.channel.outputs.VERSION }} `
            /p:FileVersion=${{ steps.nbgv.outputs.AssemblyFileVersion }} `
            /p:AssemblyVersion=${{ steps.nbgv.outputs.AssemblyVersion }} `
            -o out

      - name: Clean publish output
        shell: pwsh
        run: |
          # Remove .NET crash dump utility
          Remove-Item -Path "out\createdump.exe" -ErrorAction SilentlyContinue
          # Remove debug symbols (libSkiaSharp.pdb is ~80 MB)
          Remove-Item -Path "out\*.pdb" -ErrorAction SilentlyContinue

      - name: Create zip archive
        shell: pwsh
        run: |
          Compress-Archive -Path "out\*" -DestinationPath "eft-dma-radar.zip"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $flags = @(
            "${{ steps.channel.outputs.TAG }}"
            "eft-dma-radar.zip"
            "--title", "${{ steps.channel.outputs.RELEASE_NAME }}"
            "--target", "${{ github.sha }}"
            "--notes", "${{ github.event.head_commit.message }}"
          )
          if ("${{ steps.channel.outputs.PRERELEASE }}" -eq "true") {
            $flags += "--prerelease"
          } else {
            $flags += "--latest"
          }
          gh release create @flags

      - name: Send Discord Webhook (Release Published)
        if: env.DISCORD_WEBHOOK != ''
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.channel.outputs.TAG }}
          RELEASE_NAME: ${{ steps.channel.outputs.RELEASE_NAME }}
          VERSION: ${{ steps.channel.outputs.VERSION }}
          CHANNEL: ${{ steps.channel.outputs.CHANNEL }}
          EMOJI: ${{ steps.channel.outputs.EMOJI }}
          COLOR: ${{ steps.channel.outputs.COLOR }}
        run: |
          $payload = @{
            username = "GitHub Actions"
            embeds = @(
              @{
                title = "$env:EMOJI $env:RELEASE_NAME"
                description = "✅ Release published!"
                url = $env:RELEASE_URL
                color = [int]$env:COLOR
                fields = @(
                  @{
                    name  = "Version"
                    value = "``$env:VERSION``"
                    inline = $true
                  },
                  @{
                    name  = "Channel"
                    value = $env:CHANNEL
                    inline = $true
                  },
                  @{
                    name  = "Download"
                    value = "[$env:RELEASE_NAME]($env:RELEASE_URL)"
                  }
                )
              }
            )
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK -Method Post -ContentType "application/json" -Body $payload
